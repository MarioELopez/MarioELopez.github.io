name: Actualizar meta.json

on:
  push:
    branches: [main]

jobs:
  update-meta:
    runs-on: ubuntu-latest
    # Solo corre cuando el push lo hizo Mario, no el bot de Strava
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generar meta.json con fecha del último commit
        run: |
          DATE=$(git log -1 --format="%aI")
          SHA=$(git rev-parse --short HEAD)
          printf '{"last_updated":"%s","sha":"%s"}\n' "$DATE" "$SHA" > meta.json

      - name: Commit meta.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta.json
          git diff --cached --quiet || git commit -m "chore: actualizar meta.json [skip ci]"
          git push
