<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mario E. López C.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #13131a;
      --surface2:   #1c1c27;
      --border:     #2a2a3a;
      --accent:     #6c63ff;
      --accent2:    #a78bfa;
      --text:       #e8e8f0;
      --text-muted: #8888aa;
      --glow:       rgba(108, 99, 255, 0.12);
      --orange:     #d4682a;
      --orange2:    #e8924d;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,104,42,0.14), transparent),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(232,146,77,0.09), transparent);
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── PROFILE ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--surface2);
      overflow: hidden;
      box-shadow: 0 0 0 3px var(--surface2), 0 0 0 5px var(--border), 0 8px 32px var(--glow);
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 28% 15%;
    }

    .profile h1 {
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: clamp(0.8rem, 3vw, 0.9rem);
      color: var(--text-muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.75rem;
      color: #e8924d;
      font-weight: 500;
    }

    /* ── STREAK badge ── */
    .streak-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #e07830;
      background: rgba(212,104,42,0.1);
      border: 1px solid rgba(212,104,42,0.25);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      padding: 0 0.25rem;
      margin-top: 0.4rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link-card:hover, .link-card:focus {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 4px 24px var(--glow);
      outline: none;
    }

    .link-card:active { transform: translateY(0); }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 21px; height: 21px; }

    .link-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
      min-width: 0;
    }

    .link-name {
      font-weight: 500;
      font-size: clamp(0.82rem, 3vw, 0.9rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-handle {
      font-size: clamp(0.7rem, 2.5vw, 0.75rem);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--text-muted);
      opacity: 0.4;
      transition: opacity 0.18s, transform 0.18s;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    /* ── BOTÓN DE DESCARGA ── */
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.4rem 0.7rem;
      background: rgba(212,104,42,0.1);
      border: 1px solid rgba(212,104,42,0.25);
      border-radius: 8px;
      color: #e8924d;
      font-size: 0.72rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      cursor: pointer;
    }

    .download-btn:hover {
      background: rgba(212,104,42,0.2);
      border-color: #d4682a;
      transform: translateY(-1px);
    }

    .download-btn svg { flex-shrink: 0; }

    /* ── ICON COLORS ── */
    .ig  { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); }
    .tt  { background: #010101; border: 1px solid #333; }
    .fb  { background: #1877f2; }
    .dc  { background: #5865f2; }
    .sp  { background: #1db954; }
    .duo { background: #58cc02; }
    .li  { background: #0a66c2; }
    .gh  { background: #24292e; border: 1px solid #444; }
    .cv  { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .strava { background: #fc4c02; }

    /* ── FOOTER ── */
    .footer {
      font-size: 0.68rem;
      color: var(--text-muted);
      opacity: 0.45;
      text-align: center;
      padding-bottom: 0.5rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; }
      .avatar { width: 78px; height: 78px; }
      .link-card { padding: 0.75rem 0.85rem; gap: 0.7rem; }
      .link-icon { width: 36px; height: 36px; border-radius: 8px; }
      .download-btn { padding: 0.4rem 0.5rem; font-size: 0.68rem; }
      .link-name { font-size: 0.82rem; }
      .link-handle { font-size: 0.68rem; }
    }

    @media (min-width: 768px) {
      .container { max-width: 560px; }
      .link-card { padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- Generado por JavaScript desde config.js -->
</div>

<script src="config.js"></script>

const ARROW = `<svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

// ── CONSTRUIR PÁGINA ──────────────────────────────────────
function buildPage() {
  const app = document.getElementById('app');

  // Perfil
  app.innerHTML = `
    <div class="profile">
      <div class="avatar"><img src="FOTO_PERFIL.jpg" alt="Mario E. López C."></div>
      <h1>${CONFIG.nombre}</h1>
      <p class="tagline">${CONFIG.tagline}</p>
      <span class="badge">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
        ${CONFIG.badge}
      </span>
    </div>

    <div class="links" id="links-container"></div>

    <p class="footer">© ${new Date().getFullYear()} ${CONFIG.footer}</p>
  `;

  // Links agrupados por sección
  const container = document.getElementById('links-container');
  const secciones = ['social', 'profesional'];
  const labels    = { social: 'Redes Sociales', profesional: 'Profesional' };

  secciones.forEach(seccion => {
    const items = CONFIG.links.filter(l => l.seccion === seccion);
    if (!items.length) return;

    const label = document.createElement('p');
    label.className = 'section-label';
    label.textContent = labels[seccion];
    container.appendChild(label);

    items.forEach(link => {
      const a = document.createElement('a');
      a.className = 'link-card';
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener';
      // Botón derecho: streak para Duolingo, descarga para CV, flecha para el resto
      let rightHTML;
      if (link.id === 'duolingo') {
        rightHTML = `<span class="streak-badge">🔥 ${CONFIG.duolingoStreak}</span>`;
      } else if (link.id === 'cv' && link.urlDescarga) {
        rightHTML = `<a class="download-btn" href="${link.urlDescarga}" download
             onclick="event.stopPropagation()">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
               <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
               <polyline points="7 10 12 15 17 10"/>
               <line x1="12" y1="15" x2="12" y2="3"/>
             </svg>
             PDF
           </a>`;
      } else {
        rightHTML = ARROW;
      }

      a.innerHTML = `
        <div class="link-icon ${link.icono}">${ICONOS[link.icono] || ''}</div>
        <div class="link-info">
          <span class="link-name">${link.nombre}</span>
          <span class="link-handle">${link.handle}</span>
        </div>
        ${rightHTML}
      `;
      container.appendChild(a);
    });
  });
}

buildPage();
</script>
</body>
</html>
