  <style>
    :root {
      --bg:          #0a0a0f;
      --surface:     #13131a;
      --surface2:    #1c1c27;
      --border:      #2a2a3a;
      --accent:      #6c63ff;
      --accent2:     #a78bfa;
      --text:        #e8e8f0;
      --text-muted:  #8888aa;
      --glow:        rgba(108, 99, 255, 0.12);
      --orange:      #d4682a;
      --orange2:     #e8924d;
      --orange-glow: rgba(212, 104, 42, 0.15);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUpCard {
      from { opacity: 0; transform: translateY(18px) rotate(-1.2deg); }
      to   { opacity: 1; transform: translateY(0)    rotate(0deg); }
    }
    .fade-up-card {
      opacity: 0;
      animation: fadeUpCard 0.5s ease forwards;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      padding-top: 3.5rem;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,104,42,0.28), transparent),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(232,146,77,0.18), transparent);
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── NOSCRIPT FALLBACK ── */
    .noscript-msg {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.75rem; padding: 3rem 1.5rem; text-align: center;
    }
    .noscript-msg h1 { font-size: 1.4rem; font-weight: 600; }
    .noscript-msg p  { font-size: 0.85rem; color: var(--text-muted); }
    .noscript-msg a  { color: var(--orange); text-decoration: none; }
    .noscript-msg a:hover { text-decoration: underline; }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      position: fixed;
      top: 0.75rem; right: 0.75rem;
      z-index: 100;
      display: flex; align-items: center; gap: 2px;
      background: rgba(13,13,20,0.72);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 999px; padding: 3px;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
      -webkit-tap-highlight-color: transparent; user-select: none;
      opacity: 0; animation: fadeUp 0.4s ease 0.3s forwards;
    }
    .mode-pill {
      padding: 0.3rem 0.9rem; border-radius: 999px; border: none;
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      background: transparent; color: rgba(136,136,170,0.65);
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
      font-family: 'Inter', sans-serif;
    }
    .mode-pill:hover { color: var(--text); }
    .mode-pill.active {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #fff;
      box-shadow: 0 2px 14px rgba(212,104,42,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    /* ── PROFILE ── */
    .profile {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.75rem; text-align: center;
    }

    .avatar-wrap {
      position: relative;
      width: 96px; height: 96px; flex-shrink: 0;
    }
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, var(--orange), var(--accent), var(--orange2));
      animation: blob-morph var(--avatar-blob-duration, 6s) ease-in-out infinite;
      z-index: 0;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    }
    @keyframes blob-morph {
      0%,100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      25%      { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
      50%      { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
      75%      { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
    }

    .avatar {
      position: relative; z-index: 1;
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--surface2); overflow: hidden;
      box-shadow: 0 8px 32px var(--orange-glow);
      flex-shrink: 0;
    }
    /* ✅ loading="eager" y fetchpriority="high" se aplican inline en el HTML del avatar */
    .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: 28% 15%; }

    .profile h1 { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 600; letter-spacing: -0.02em; }
    .tagline { font-size: clamp(0.8rem, 3vw, 0.9rem); color: var(--text-muted); }
    .descripcion { font-size: clamp(0.72rem, 2.5vw, 0.78rem); color: var(--text-muted); opacity: 0.7; letter-spacing: 0.01em; }

    .skills { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; margin-top: 0.1rem; }
    .skill-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
      padding: 0.22rem 0.7rem; font-size: 0.7rem; color: var(--text-muted); font-weight: 500;
      transition: border-color 0.18s, color 0.18s;
    }
    .skill-chip:hover { border-color: var(--orange); color: var(--text); }

    .share-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
      padding: 0.3rem 0.85rem; font-size: 0.72rem; color: var(--text-muted); font-weight: 500;
      cursor: pointer; transition: border-color 0.18s, color 0.18s; margin-top: 0.25rem;
    }
    .share-btn:hover { border-color: var(--orange); color: var(--text); }
    .share-btn.copied { border-color: rgba(59,195,120,0.4); color: #3bc378; }

    .actualmente {
      width: 100%; display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid #d4682a; border-radius: 12px; font-size: 0.8rem; color: var(--text-muted);
    }
    .actualmente strong { color: var(--text); font-weight: 600; white-space: nowrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
      padding: 0.3rem 0.85rem; font-size: 0.75rem; color: #e8924d; font-weight: 500;
    }

    .streak-badge {
      display: flex; align-items: center; justify-content: center; gap: 0.25rem;
      font-size: 0.72rem; font-weight: 700; color: #e07830;
      background: rgba(212,104,42,0.1); border: 1px solid rgba(212,104,42,0.25);
      border-radius: 8px; padding: 0.4rem 0.6rem; white-space: nowrap; flex-shrink: 0;
    }

    /* ── LINKS ── */
    .links { width: 100%; display: flex; flex-direction: column; gap: 0.65rem; }

    .section-label {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-muted);
      padding: 0 0.25rem; margin-top: 0.4rem;
    }

    .link-card {
      display: flex; align-items: center; gap: 0.9rem; padding: 0.85rem 1rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      text-decoration: none; color: var(--text); position: relative; overflow: hidden;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .link-card:hover, .link-card:focus {
      transform: translateY(-2px);
      border-color: var(--orange);
      box-shadow: 0 4px 24px var(--orange-glow);
      outline: none;
    }
    .link-card:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
    }
    .link-card:active { transform: translateY(0); }

    .link-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-icon svg { width: 21px; height: 21px; }
    .link-info { flex: 1; display: flex; flex-direction: column; gap: 0.08rem; min-width: 0; }
    .link-name { font-weight: 500; font-size: clamp(0.82rem, 3vw, 0.9rem); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-handle { font-size: clamp(0.7rem, 2.5vw, 0.75rem); color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-arrow { color: var(--text-muted); opacity: 0.4; transition: opacity 0.18s, transform 0.18s; flex-shrink: 0; }
    .link-card:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    .download-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
      padding: 0.4rem 0.7rem; background: rgba(212,104,42,0.1); border: 1px solid rgba(212,104,42,0.25);
      border-radius: 8px; color: #e8924d; font-size: 0.72rem; font-weight: 600;
      text-decoration: none; white-space: nowrap; flex-shrink: 0; cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }
    .download-btn:hover { background: rgba(212,104,42,0.2); border-color: #d4682a; transform: translateY(-1px); }
    .download-btn svg { flex-shrink: 0; }

    .copy-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
      padding: 0.4rem 0.7rem; background: rgba(212,104,42,0.1); border: 1px solid rgba(212,104,42,0.25);
      border-radius: 8px; color: #e8924d; font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0; cursor: pointer;
      transition: background 0.18s, border-color 0.18s; position: relative;
    }
    .copy-btn:hover { background: rgba(212,104,42,0.2); border-color: #d4682a; }
    .copy-btn.copied { background: rgba(59,195,120,0.15); border-color: rgba(59,195,120,0.4); color: #3bc378; }

    .ig     { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); }
    .tt     { background: #010101; border: 1px solid #333; }
    .fb     { background: #1877f2; }
    .dc     { background: #5865f2; }
    .sp     { background: #1db954; }
    .duo    { background: #58cc02; }
    .li     { background: #0a66c2; }
    .gh     { background: #24292e; border: 1px solid #444; }
    .cv     { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .strava { background: #fc4c02; }

    /* ── STATS ROW ── */
    .stats-row {
      width: 100%; display: flex; gap: 0.5rem; justify-content: center;
    }
    .stat-card {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 0.15rem; padding: 0.6rem 0.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      transition: border-color 0.18s;
    }
    .stat-card:hover { border-color: var(--orange); }
    .stat-value {
      font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 700;
      color: var(--text); letter-spacing: -0.03em; line-height: 1;
    }
    .stat-label {
      font-size: 0.62rem; color: var(--text-muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
    }

    .footer { font-size: 0.68rem; color: var(--text-muted); opacity: 0.45; text-align: center; padding-bottom: 0.25rem; }

    .footer-update {
      font-size: 0.62rem; color: var(--text-muted); opacity: 0.5;
      text-align: center; padding-bottom: 0.5rem; letter-spacing: 0.02em;
    }

    /* ── BADGE PULSE ── */
    .badge-dot {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .badge-dot::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e8924d;
      animation: badge-pulse 2.2s ease-out infinite;
      opacity: 0;
    }
    @keyframes badge-pulse {
      0%   { transform: scale(1);   opacity: 0.65; }
      100% { transform: scale(3);   opacity: 0; }
    }

    /* ── SECCIÓN DESPLEGABLE ── */
    .section-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; cursor: pointer; padding: 0 0.25rem; margin-top: 0.4rem;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .section-toggle .section-label { margin-top: 0; pointer-events: none; }

    .section-toggle-icon {
      width: 18px; height: 18px; color: var(--text-muted);
      transition: transform 0.3s ease, color 0.2s; flex-shrink: 0;
    }
    .section-toggle:hover .section-toggle-icon { color: var(--orange); }
    .section-toggle.open .section-toggle-icon { transform: rotate(180deg); }

    .section-collapsible {
      width: 100%; display: flex; flex-direction: column; gap: 0.65rem;
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0;
    }
    .section-collapsible.open { max-height: 600px; opacity: 1; }

    .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.55s linear; background: rgba(255,255,255,0.08); pointer-events: none; }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; padding-top: 3.5rem; }
      .avatar-wrap { width: 78px; height: 78px; }
      .avatar { width: 78px; height: 78px; }
      .link-card { padding: 0.75rem 0.85rem; gap: 0.7rem; }
      .link-icon { width: 36px; height: 36px; border-radius: 8px; }
      .download-btn { padding: 0.4rem 0.5rem; font-size: 0.68rem; }
      .link-name { font-size: 0.82rem; }
      .link-handle { font-size: 0.68rem; }
    }

    @media (min-width: 768px) {
      .container { max-width: 560px; }
      .link-card { padding: 1rem 1.2rem; }
    }

    /* ── SPLIT SCREEN (desktop ambos modos) ── */
    .split-screen { width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
    @media (min-width: 768px) {
      .split-screen { flex-direction: row; align-items: flex-start; gap: 2.5rem; }
      .container:has(.split-screen) { max-width: 920px; }
      .split-left {
        width: 220px; flex-shrink: 0;
        position: sticky; top: 1.5rem;
        display: flex; flex-direction: column; align-items: center;
        gap: 0.75rem; text-align: center;
      }
      .split-right {
        flex: 1; display: flex; flex-direction: column;
        gap: 0.65rem; min-width: 0;
      }
      .split-right .stats-row { justify-content: flex-start; }
      .split-right .share-btn { align-self: flex-start; }
    }

    /* ── MOBILE SCROLL HERO ── */
    @media (max-width: 767px) {
      :root { --mhero-extra: 34px; }

      /* Hero: ocupa casi todo el viewport para empujar links abajo */
      .mob-hero {
        min-height: calc(100svh - 200px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 0.75rem;
        padding: 3.5rem 1rem 0.5rem;
      }
      /* Avatar más grande en estado hero */
      .mob-hero .avatar-wrap {
        width: calc(96px + var(--mhero-extra)) !important;
        height: calc(96px + var(--mhero-extra)) !important;
        transition: width 0.12s ease, height 0.12s ease;
      }
      .mob-hero .avatar {
        width: calc(96px + var(--mhero-extra)) !important;
        height: calc(96px + var(--mhero-extra)) !important;
        transition: width 0.12s ease, height 0.12s ease;
      }
      .mob-hero .avatar-wrap::before {
        /* Ajustar el blob al nuevo tamaño */
        inset: -3px;
      }
      /* Peeking card borrosa */
      .mob-peek-blur {
        filter: blur(5px);
        opacity: 0.5;
        pointer-events: none;
        user-select: none;
        transition: filter 0.35s ease, opacity 0.35s ease;
      }
    }

    /* ── MOBILE: fix hover stuck + estado activo táctil ── */
    @media (hover: none) {
      .link-card:hover {
        transform: none !important; border-color: var(--border) !important;
        box-shadow: none !important;
      }
      .link-card:hover .link-arrow { opacity: 0.4; transform: none; }
      .link-card:active {
        transform: scale(0.97) !important;
        border-color: rgba(212,104,42,0.5) !important;
        opacity: 0.88; transition: transform 0.08s, opacity 0.08s !important;
      }
    }

    /* ── SKELETON LOADING ── */
    .skeleton-val {
      display: inline-block; min-width: 2.4rem; height: 1.1em;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: skeleton-shine 1.4s infinite;
      border-radius: 4px; vertical-align: middle;
    }
    @keyframes skeleton-shine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── TOAST ── */
    .toast-msg {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(13,13,20,0.92); border: 1px solid rgba(212,104,42,0.4);
      border-radius: 999px; padding: 0.55rem 1.2rem;
      font-size: 0.8rem; font-weight: 600; color: var(--text);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.45);
      z-index: 9998; pointer-events: none;
      opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast-msg.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── AVATAR FLIP (3D coin-flip) ── */
    .avatar-wrap { perspective: 600px; }
    .avatar-flip-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .avatar-flip-inner.flipped { transform: rotateY(180deg); }
    .avatar-face, .avatar-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 50%;
      overflow: hidden;
    }
    .avatar-back { transform: rotateY(180deg); }
    .avatar-age {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; width: 100%; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a1a00 0%, #0a0a0f 100%);
      border: 2px solid var(--orange);
      box-shadow: 0 0 24px rgba(212,104,42,0.35), inset 0 0 20px rgba(212,104,42,0.08);
    }
    .avatar-age .age-n {
      font-size: 2.4rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, #ffd280 0%, var(--orange) 50%, #c0440a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(212,104,42,0.6));
    }
    .avatar-age .age-l {
      font-size: 0.58rem; color: rgba(212,104,42,0.7);
      text-transform: uppercase; letter-spacing: 0.14em; margin-top: 3px;
    }
    .avatar-age .age-emoji { font-size: 0.9rem; margin-bottom: 2px; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .lightbox.lb-visible { opacity: 1; }
    .lightbox-img {
      width: min(280px,90vw); height: min(280px,90vw);
      border-radius: 50%; object-fit: cover; object-position: 28% 15%;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
      transform: scale(0.82); transition: transform 0.25s ease;
    }
    .lightbox.lb-visible .lightbox-img { transform: scale(1); }

    /* ── VISITED CARD OVERLAY ── */
    .visited-overlay {
      position: absolute; inset: 0; border-radius: 14px;
      background: rgba(0,0,0,0.16); pointer-events: none; z-index: 2;
    }

    /* ── GLITCH (terminal easter egg) ── */
    @keyframes glitch-kf {
      0%,100% { transform: none; filter: none; }
      8%   { transform: skew(-5deg) translateX(-4px); filter: invert(1); }
      16%  { transform: skew(3deg) translateX(5px); filter: hue-rotate(90deg) saturate(4); }
      24%  { transform: none; filter: brightness(2); }
      32%  { transform: skew(-2deg) translateX(-2px); filter: hue-rotate(200deg); }
      40%  { transform: none; filter: none; }
    }
    .glitch-fx { animation: glitch-kf 0.4s ease forwards; }

    /* ── TERMINAL ── */
    #ml-terminal {
      /* default theme vars */
      --t-bg:  #0d1117;
      --t-txt: #00e676;
      --t-th:  #ffbd2e;
      --t-tc:  #64b5f6;
      --t-tp:  #e8924d;
      --t-te:  #ff5f56;
      --t-ts:  #666;
      position: fixed; inset: 0; z-index: 9999;
      background: var(--t-bg);
      display: flex; flex-direction: column;
      font-family: 'Courier New', Courier, monospace;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease, background 0.4s ease, color 0.4s ease;
    }
    #ml-terminal.t-open { opacity: 1; pointer-events: all; }
    #t-bar {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.35); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.6rem 1rem; flex-shrink: 0;
    }
    #t-bar .t-title { flex: 1; text-align: center; font-size: 0.68rem; color: var(--t-ts); letter-spacing: 0.06em; }
    .t-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
    .td-r { background: #ff5f56; } .td-y { background: #ffbd2e; } .td-g { background: #27c93f; }
    #t-out {
      flex: 1; overflow-y: auto; padding: 0.85rem 1rem;
      color: var(--t-txt); font-size: clamp(0.68rem,2.5vw,0.8rem);
      line-height: 1.65; white-space: pre-wrap; word-break: break-all;
      transition: color 0.4s ease;
    }
    #t-out .tp { color: var(--t-tp); } /* prompt */
    #t-out .ts { color: var(--t-ts); } /* system */
    #t-out .te { color: var(--t-te); } /* error */
    #t-out .th { color: var(--t-th); } /* highlight */
    #t-out .tc { color: var(--t-tc); } /* comment/info */
    #t-in-row {
      display: flex; align-items: center; gap: 0.4rem;
      border-top: 1px solid rgba(255,255,255,0.06); padding: 0.6rem 1rem; flex-shrink: 0;
    }
    #t-prompt { color: var(--t-tp); font-size: 0.78rem; white-space: nowrap; flex-shrink: 0; }
    #t-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--t-txt); font-family: inherit; font-size: 0.78rem; caret-color: var(--t-txt);
      transition: color 0.4s ease;
    }

    /* ── PYTHON EDITOR MODAL (nano) ── */
    #py-editor {
      position: fixed; inset: 0; z-index: 10000;
      background: #0d1117;
      display: flex; flex-direction: column;
      font-family: 'Courier New', Courier, monospace;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #py-editor.open { opacity: 1; pointer-events: all; }
    #py-editor-bar {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 0.45rem 0.8rem; flex-shrink: 0;
    }
    #py-editor-title {
      flex: 1; min-width: 100px;
      color: #8b949e; font-size: 0.72rem; letter-spacing: 0.04em;
    }
    .py-ed-btn {
      padding: 0.22rem 0.65rem; border-radius: 5px; border: none;
      font-family: inherit; font-size: 0.68rem; cursor: pointer;
      transition: filter 0.15s; white-space: nowrap;
    }
    .py-ed-btn:hover { filter: brightness(1.2); }
    .py-ed-run   { background: #238636; color: #fff; }
    .py-ed-save  { background: #1f6feb; color: #fff; }
    .py-ed-dl    { background: transparent; color: #58a6ff; border: 1px solid #388bfd55; }
    .py-ed-close { background: #da3633; color: #fff; }
    #py-editor-code {
      flex: 1; min-height: 0;
      padding: 0.9rem 1rem; background: #0d1117;
      color: #e6edf3; font-family: inherit; font-size: clamp(0.72rem,2.2vw,0.88rem);
      border: none; outline: none; resize: none; line-height: 1.65;
      tab-size: 4; -moz-tab-size: 4;
    }
    #py-editor-divider {
      height: 1px; background: #30363d; flex-shrink: 0;
    }
    #py-editor-out-label {
      padding: 0.2rem 1rem; background: #161b22;
      font-size: 0.62rem; color: #58a6ff; letter-spacing: 0.05em; flex-shrink: 0;
    }
    #py-editor-out {
      height: clamp(80px, 22vh, 180px);
      overflow-y: auto; padding: 0.5rem 1rem;
      background: #010409; color: #00e676;
      font-size: clamp(0.65rem,2vw,0.78rem); line-height: 1.55;
      white-space: pre-wrap; word-break: break-all; flex-shrink: 0;
    }
    #py-editor-out .te { color: #f85149; }
    #py-editor-out .ts { color: #6e7681; }
    #py-editor-status {
      padding: 0.28rem 1rem; background: #161b22;
      border-top: 1px solid #21262d; font-size: 0.6rem;
      color: #6e7681; flex-shrink: 0; letter-spacing: 0.04em;
    }
  </style>
</head>

  return window.location.hash === '#pro' ? 'pro' : 'casual';

  document.documentElement.style.setProperty('--avatar-blob-duration', CONFIG.avatarBlobDuration);
}

// ── TEXT SCRAMBLE (hover desktop + touch móvil) ──
var _SCHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#!';
var _stMap     = (typeof WeakMap !== 'undefined') ? new WeakMap() : null;
var _activeCards = (typeof Set !== 'undefined') ? new Set() : null; // guard a nivel de card
function _scramble(el, cb) {
  if (_stMap && _stMap.has(el)) { clearInterval(_stMap.get(el)); }
  var orig = el.getAttribute('data-orig') || el.textContent;
  el.setAttribute('data-orig', orig);
  var step = 0, total = orig.length * 2.8;
  var iv = setInterval(function() {
    el.textContent = orig.split('').map(function(ch, i) {
      if (ch === ' ') return ' ';
      if (i < Math.floor(step / 2.8)) return orig[i];
      return _SCHARS[Math.floor(Math.random() * _SCHARS.length)];
    }).join('');
    step++;
    if (step > total) {
      clearInterval(iv);
      el.textContent = orig;
      if (_stMap) _stMap.delete(el);
      if (cb) cb();
    }
  }, 28);
  if (_stMap) _stMap.set(el, iv);
}
// Desktop: mouseenter en capture — _activeCards (card-level) evita doble disparo
document.addEventListener('mouseenter', function(e) {
  if (!window.matchMedia('(hover: hover)').matches) return;
  var card = e.target.closest('.link-card');
  if (!card) return;
  if (_activeCards && _activeCards.has(card)) return; // ya activo para esta card
  if (_activeCards) _activeCards.add(card);
  var nameEl = card.querySelector('.link-name');
  if (nameEl) _scramble(nameEl);
}, true);
// Desktop: mouseleave limpia el guard cuando el mouse sale realmente de la card
document.addEventListener('mouseleave', function(e) {
  var card = e.target.closest('.link-card');
  if (!card) return;
  // Verificar que el relatedTarget esté fuera de la card
  if (e.relatedTarget && card.contains(e.relatedTarget)) return;
  if (_activeCards) _activeCards.delete(card);
}, true);
// Móvil: touchstart dispara scramble
document.addEventListener('touchstart', function(e) {
  var card = e.target.closest('.link-card');
  if (!card) return;
  var nameEl = card.querySelector('.link-name');
  if (nameEl) _scramble(nameEl);
}, { passive: true });

var _twIv = null;
function typewriterEffect() {
  if (_twIv) { clearInterval(_twIv); _twIv = null; }
  var el = document.getElementById('tagline-el');
  if (!el) return;
  var text = el.getAttribute('data-tw') || el.textContent;
  el.setAttribute('data-tw', text);
  el.textContent = '';
  el.style.borderRight = '1.5px solid var(--orange2)';
  el.style.paddingRight = '2px';
  var i = 0;
  _twIv = setInterval(function() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
    } else {
      clearInterval(_twIv); _twIv = null;
      setTimeout(function() {
        if (el.parentNode) { el.style.borderRight = ''; el.style.paddingRight = ''; }
      }, 800);
    }
  }, 34);
}

function getModeConfig() {
  return CONFIG.modos[currentMode];
}

  }
}

var ARROW = '<svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

// ── IDs con rel="me" para verificación de identidad ──
var REL_ME_IDS = { instagram: true, linkedin: true, github: true };

// ── DELAY MÁXIMO para animaciones (evita acumulación en listas largas) ──
var MAX_DELAY = 0.9;

// ── CONSTRUIR PÁGINA ──
function buildPage() {
  window.scrollTo(0, 0);
  var app  = document.getElementById('app');
  var modo = getModeConfig();

  updateToggleUI();

  var skillsHTML = '';
  var skillsList = (modo.skills || CONFIG.skills);
  if (modo.mostrarSkills && skillsList) {
    skillsHTML = '<div class="skills fade-up" style="animation-delay:0.33s">';
    for (var i = 0; i < skillsList.length; i++) {
      var s = skillsList[i];
      skillsHTML += '<span class="skill-chip">' + s.icono + ' ' + s.nombre + '</span>';
    }
    skillsHTML += '</div>';
  }

  var badgeHTML = '';
  if (modo.badge) {
    badgeHTML =
      '<span class="badge fade-up" style="animation-delay:0.4s">' +
        '<span class="badge-dot"><svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg></span> ' +
        modo.badge +
      '</span>';
  }

  var actualmenteHTML = '';
  if (modo.actualmente) {
    actualmenteHTML =
      '<div class="actualmente fade-up" id="actualmente-el" style="animation-delay:0.42s">' +
        '<span>\uD83D\uDD28</span>' +
        '<span><strong>Actualmente:</strong> ' + modo.actualmente + '</span>' +
      '</div>';
  }

  var descripcionHTML = '';
  if (modo.descripcion) {
    descripcionHTML = '<p class="descripcion fade-up" style="animation-delay:0.28s">' + modo.descripcion + '</p>';
  }

  var isSplit = window.innerWidth >= 768;

  var _avatarHTML =
    '<div class="avatar-wrap fade-up" style="animation-delay:0.05s">' +
      '<div class="avatar">' +
        '<picture>' +
          '<source srcset="FOTO_PERFIL.webp" type="image/webp">' +
          '<img src="FOTO_PERFIL.jpg" alt="Mario E. L\u00f3pez C." loading="eager" fetchpriority="high">' +
        '</picture>' +
      '</div>' +
    '</div>';
  var _nameTagHTML =
    '<h1 class="fade-up" style="animation-delay:0.15s">' + CONFIG.nombre + '</h1>' +
    '<p class="tagline fade-up" id="tagline-el" style="animation-delay:0.22s">' + modo.tagline + '</p>' +
    descripcionHTML;
  var _statsHTML =
    '<div class="stats-row fade-up" style="animation-delay:0.44s">' +
      '<div class="stat-card">' +
        '<span class="stat-value" id="stat-streak"><span class="skeleton-val">&nbsp;&nbsp;&nbsp;&nbsp;</span></span>' +
        '<span class="stat-label">\uD83D\uDD25 Racha Duolingo</span>' +
      '</div>' +
      '<div class="stat-card">' +
        '<span class="stat-value" id="stat-km"><span class="skeleton-val">&nbsp;&nbsp;&nbsp;&nbsp;</span></span>' +
        '<span class="stat-label">\uD83D\uDEB4 Km en Strava</span>' +
      '</div>' +
    '</div>';
  var _shareHTML =
    '<button class="share-btn fade-up" id="share-btn" aria-label="Compartir p\u00e1gina" style="animation-delay:0.46s">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
        '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>' +
        '<line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>' +
        '<line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>' +
      '</svg>' +
      '<span id="share-label">Compartir p\u00e1gina</span>' +
    '</button>';
  var _footerHTML =
    '<p class="footer">\u00a9 ' + new Date().getFullYear() + ' ' + CONFIG.footer + '</p>' +
    '<p class="footer-update" id="last-updated"></p>';

  if (isSplit) {
    app.innerHTML =
      '<div class="split-screen">' +
        '<div class="split-left">' +
          '<div class="profile">' + _avatarHTML + _nameTagHTML + skillsHTML + badgeHTML + '</div>' +
          actualmenteHTML +
        '</div>' +
        '<div class="split-right">' +
          _statsHTML + _shareHTML +
          '<div class="links" id="links-container"></div>' +
          _footerHTML +
        '</div>' +
      '</div>';
  } else {
    app.innerHTML =
      '<div class="profile">' +
        _avatarHTML + _nameTagHTML + skillsHTML + badgeHTML +
        _statsHTML + _shareHTML +
      '</div>' +
      actualmenteHTML +
      '<div class="links" id="links-container"></div>' +
      _footerHTML;
  }

  var container  = document.getElementById('links-container');
  var ordenLinks = modo.ordenLinks;

  for (var idx = 0; idx < ordenLinks.length; idx++) {
    var entry = ordenLinks[idx];

    // ✅ Delay con tope máximo para evitar acumulación
    var delay = Math.min(0.45 + idx * 0.07, MAX_DELAY);

    if (entry === '_profesional_toggle') {
      // Contar cuántos links reales hay dentro de la sección colapsable
      var proCount = 0;
      for (var ci = idx + 1; ci < ordenLinks.length; ci++) {
        var cEntry = ordenLinks[ci];
        if (cEntry.startsWith('_')) break;
        for (var cj = 0; cj < CONFIG.links.length; cj++) {
          if (CONFIG.links[cj].id === cEntry) { proCount++; break; }
        }
      }
      var countBadge = proCount > 0
        ? ' <span style="font-size:0.6rem;opacity:0.5;font-weight:400;letter-spacing:0">· ' + proCount + '</span>'
        : '';

      var toggleDiv = document.createElement('div');
      toggleDiv.className = 'section-toggle fade-up';
      toggleDiv.style.animationDelay = delay + 's';
      toggleDiv.setAttribute('role', 'button');
      toggleDiv.setAttribute('tabindex', '0');
      toggleDiv.setAttribute('aria-expanded', 'false');
      toggleDiv.setAttribute('aria-controls', 'collapsible-profesional');
      toggleDiv.innerHTML =
        '<p class="section-label">' + SECTION_LABELS[entry] + countBadge + '</p>' +
        '<svg class="section-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
      container.appendChild(toggleDiv);

      var collapsible = document.createElement('div');
      collapsible.className = 'section-collapsible';
      collapsible.id = 'collapsible-profesional';
      container.appendChild(collapsible);

      (function(td) {
        function toggleSection() {
          var col    = document.getElementById('collapsible-profesional');
          var isOpen = td.classList.toggle('open');
          col.classList.toggle('open');
          td.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }
        td.addEventListener('click', toggleSection);
        td.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSection(); }
        });
      })(toggleDiv);

      container = collapsible;
      continue;
    }

    if (SECTION_LABELS[entry]) {
      var label = document.createElement('p');
      label.className = 'section-label fade-up';
      label.style.animationDelay = delay + 's';
      label.textContent = SECTION_LABELS[entry];
      container.appendChild(label);
      continue;
    }

    var link = null;
    for (var j = 0; j < CONFIG.links.length; j++) {
      if (CONFIG.links[j].id === entry) { link = CONFIG.links[j]; break; }
    }
    if (!link) continue;
    if (link.id === 'cv' && !modo.mostrarCV) continue;

    // Discord: botón de copiar usuario
    if (link.id === 'discord' && link.discordUser) {
      var dcWrapper = document.createElement('div');
      dcWrapper.className = 'link-card fade-up-card';
      dcWrapper.style.animationDelay = delay + 's';
      dcWrapper.style.cursor = 'default';
      dcWrapper.setAttribute('tabindex', '0');
      dcWrapper.setAttribute('role', 'group');
      dcWrapper.setAttribute('aria-label', 'Discord: ' + link.discordUser + '. Presion\u00e1 Enter para copiar el usuario.');
      dcWrapper.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          var btn = dcWrapper.querySelector('.copy-btn[data-copy]');
          if (btn) btn.click();
        }
      });
      dcWrapper.innerHTML =
        '<div class="link-icon ' + link.icono + '">' + (ICONOS[link.icono] || '') + '</div>' +
        '<div class="link-info">' +
          '<span class="link-name">' + link.nombre + '</span>' +
          '<span class="link-handle">' + link.handle + '</span>' +
        '</div>' +
        '<button class="copy-btn" data-copy="' + link.discordUser + '" aria-label="Copiar usuario de Discord">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
            '<rect x="9" y="9" width="13" height="13" rx="2"/>' +
            '<path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>' +
          '</svg>' +
          '<span>COPIAR</span>' +
        '</button>';
      container.appendChild(dcWrapper);
      continue;
    }

    // CV con botón de descarga
    if (link.id === 'cv' && link.urlDescarga) {
      var cvWrapper = document.createElement('div');
      cvWrapper.className = 'link-card fade-up-card';
      cvWrapper.style.animationDelay = delay + 's';
      cvWrapper.style.cursor = 'pointer';
      cvWrapper.setAttribute('tabindex', '0');
      cvWrapper.setAttribute('role', 'button');
      cvWrapper.setAttribute('aria-label', 'Ver Curr\u00edculum Vitae de Mario E. L\u00f3pez (se abre en Canva)');
      (function(url) {
        cvWrapper.addEventListener('click', function() { window.open(url, '_blank'); });
        cvWrapper.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.open(url, '_blank'); }
        });
      })(link.url);
      cvWrapper.innerHTML =
        '<div class="link-icon ' + link.icono + '">' + (ICONOS[link.icono] || '') + '</div>' +
        '<div class="link-info">' +
          '<span class="link-name">' + link.nombre + '</span>' +
          '<span class="link-handle">' + link.handle + '</span>' +
        '</div>' +
        '<a class="download-btn" href="' + link.urlDescarga + '" download target="_blank" onclick="event.stopPropagation()" aria-label="Descargar CV en PDF">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
            '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
            '<polyline points="7 10 12 15 17 10"/>' +
            '<line x1="12" y1="15" x2="12" y2="3"/>' +
          '</svg>' +
          'PDF' +
        '</a>';
      container.appendChild(cvWrapper);
      continue;
    }

    // Link normal
    var a = document.createElement('a');
    a.className = 'link-card fade-up-card';
    a.style.animationDelay = delay + 's';
    a.href = link.url;
    a.target = '_blank';
    a.setAttribute('data-link-id', link.id);
    // ✅ rel="me" en links de identidad propia (Instagram, LinkedIn, GitHub)
    a.rel = REL_ME_IDS[link.id] ? 'noopener me' : 'noopener';

    var handleId  = link.id === 'strava' ? ' id="strava-handle"' : '';
    var rightHTML = ARROW;

    if (link.id === 'duolingo' && CONFIG.streakActivo !== false) {
      rightHTML = '<span class="streak-badge">\uD83D\uDD25 <span class="streak-num">0</span></span>';
    }

    a.innerHTML =
      '<div class="link-icon ' + link.icono + '">' + (ICONOS[link.icono] || '') + '</div>' +
      '<div class="link-info">' +
        '<span class="link-name">' + link.nombre + '</span>' +
        '<span class="link-handle"' + handleId + '>' + link.handle + '</span>' +
      '</div>' +
      rightHTML;

    // Visited overlay si el usuario ya visitó este link
    a.style.position = 'relative';
    applyVisitedOverlay(a, link.id);

    container.appendChild(a);
  }
}

// ── TOGGLE DE MODO ──
function switchMode(newMode) {
  if (newMode === currentMode) return;
  var app = document.getElementById('app');

  // Fade rápido con blur (0.18s salida) — lo mínimo para evitar flash
  app.style.transition = 'opacity 0.18s ease, filter 0.18s ease';
  app.style.opacity = '0.08';
  app.style.filter = 'blur(2px)';

  setTimeout(function() {
    currentMode = newMode;
    window.location.hash = currentMode === 'pro' ? '#pro' : '';
    buildPage(); loadStrava(); animateStreak(); loadMeta();

    // ── Elementos "persistentes": quitar fade-up para que no re-animen
    // La foto, el nombre y las stats son idénticos en ambos modos.
    // Sin esto, el .fade-up hace que arranquen en opacity:0 y parezca que
    // la foto se recarga desde cero.
    var persist = ['.avatar-wrap', '.avatar', 'h1', '.stats-row'];
    persist.forEach(function(sel) {
      var el = document.querySelector(sel);
      if (el) {
        el.classList.remove('fade-up');
        el.style.opacity = '1';
        el.style.animation = 'none';
      }
    });

    // Fade de entrada más lento (se nota la fluidez)
    app.style.transition = 'opacity 0.3s ease, filter 0.3s ease';
    requestAnimationFrame(function() {
      app.style.opacity = '1';
      app.style.filter = 'blur(0)';
      setTimeout(typewriterEffect, 180);
      // Inicializar scroll hero si aplica (casual + mobile)
      setTimeout(initMobileScrollHero, 50);
    });
  }, 190);
}

document.getElementById('mode-toggle').addEventListener('click', function(e) {
  var pill = e.target.closest('.mode-pill');
  if (pill) switchMode(pill.getAttribute('data-mode'));
});

// ── STRAVA STATS ──
function loadStrava() {
  fetch('./strava.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('strava-handle');
      if (el && data.display && data.km_alltime > 0) {
        el.textContent = '\uD83D\uDEB4 ' + data.display;
      }
      // Stat card de km — quitar skeleton y poner dato real
      var statKm = document.getElementById('stat-km');
      if (statKm) {
        statKm.textContent = data.km_alltime > 0
          ? Math.round(data.km_alltime).toLocaleString('es')
          : '–';
      }
    })
    .catch(function() {
      // Si falla el fetch, quitar skeleton con guión
      var statKm = document.getElementById('stat-km');
      if (statKm) statKm.textContent = '–';
    });
}

// ── CALCULAR STREAK DESDE FECHA ──
function calcularStreak() {
  var inicio = new Date(CONFIG.fechaInicioStreak + 'T00:00:00');
  var hoy    = new Date();
  hoy.setHours(0, 0, 0, 0);
  return Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24));
}

// ── CONTADOR ANIMADO DUOLINGO ──
function animateStreak() {
  if (CONFIG.streakActivo === false) return;
  var el = document.querySelector('.streak-num');
  var target = calcularStreak();

  // Poblar stat card de racha — quitar skeleton y poner dato real
  var statStreak = document.getElementById('stat-streak');
  if (statStreak) statStreak.textContent = target.toLocaleString('es');

  if (!el) return;
  var duration = 1200;
  var start    = performance.now();
  function update(now) {
    var elapsed  = now - start;
    var progress = Math.min(elapsed / duration, 1);
    var ease     = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(ease * target);
    if (progress < 1) requestAnimationFrame(update);
    else el.textContent = target;
  }
  setTimeout(function() { requestAnimationFrame(update); }, 500);
}

// ── META: ÚLTIMA ACTUALIZACIÓN ──
function timeAgo(dateStr) {
  var diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  if (diff <  7) return 'hace ' + diff + ' días';
  if (diff < 30) return 'hace ' + Math.floor(diff / 7) + (Math.floor(diff / 7) === 1 ? ' semana' : ' semanas');
  if (diff < 365) { var m = Math.floor(diff / 30); return 'hace ' + m + (m === 1 ? ' mes' : ' meses'); }
  var y = Math.floor(diff / 365); return 'hace ' + y + (y === 1 ? ' año' : ' años');
}

function formatDate(dateStr) {
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d = new Date(dateStr);
  return d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
}

function loadMeta() {
  var el = document.getElementById('last-updated');
  if (!el) return;

  // Mostrar fallback desde config.js inmediatamente
  if (CONFIG.lastUpdated) {
    el.textContent = 'Actualizado ' + timeAgo(CONFIG.lastUpdated) + ' · ' + formatDate(CONFIG.lastUpdated);
  }

  // Intentar sobreescribir con meta.json (más preciso, generado por git/GitHub Actions)
  fetch('./meta.json?v=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      if (!data.last_updated) return;
      el.textContent = 'Actualizado ' + timeAgo(data.last_updated) + ' · ' + formatDate(data.last_updated);
    })
    .catch(function() {}); // silencioso — el fallback ya está visible
}

// ── PARTÍCULAS DE FONDO ──
(function() {
  var cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
  document.body.insertBefore(cv, document.body.firstChild);
  var cx = cv.getContext('2d');
  var W, H, pts;

  var COLORS = [
    'rgba(212,104,42,',   // naranja
    'rgba(232,146,77,',   // naranja claro
    'rgba(108,99,255,',   // violeta
    'rgba(167,139,250,',  // violeta claro
  ];

  function init() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    var N = Math.min(55, Math.floor(W * H / 14000));
    pts = [];
    for (var i = 0; i < N; i++) {
      pts.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r:  Math.random() * 2 + 1,
        c:  COLORS[Math.floor(Math.random() * COLORS.length)],
        o:  Math.random() * 0.18 + 0.1
      });
    }
  }

  function draw() {
    cx.clearRect(0, 0, W, H);
    // Líneas entre partículas cercanas
    for (var i = 0; i < pts.length; i++) {
      for (var j = i + 1; j < pts.length; j++) {
        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130) {
          cx.beginPath();
          cx.strokeStyle = 'rgba(212,104,42,' + (0.14 * (1 - dist/130)) + ')';
          cx.lineWidth = 0.7;
          cx.moveTo(pts[i].x, pts[i].y);
          cx.lineTo(pts[j].x, pts[j].y);
          cx.stroke();
        }
      }
    }
    // Puntos
    for (var k = 0; k < pts.length; k++) {
      var p = pts[k];
      p.x += p.vx + (window._gyroX || 0) * 0.4;
      p.y += p.vy + (window._gyroY || 0) * 0.4;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      cx.fillStyle = p.c + p.o + ')';
      cx.fill();
    }
    requestAnimationFrame(draw);
  }

  init();
  window.addEventListener('resize', init);
  draw();
})();

buildPage();
loadStrava();
animateStreak();

// ── RIPPLE EFFECT ──
document.addEventListener('click', function(e) {
  var card = e.target.closest('.link-card');
  if (!card) return;
  var ripple = document.createElement('span');
  var rect   = card.getBoundingClientRect();
  var size   = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.cssText =
    'width:' + size + 'px;height:' + size + 'px;' +
    'left:' + (e.clientX - rect.left - size / 2) + 'px;' +
    'top:'  + (e.clientY - rect.top  - size / 2) + 'px;';
  card.appendChild(ripple);
  ripple.addEventListener('animationend', function() { ripple.remove(); });
});

// ── TILT 3D + CURSOR MAGNÉTICO (solo desktop) ──
if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
  var tiltStyle = document.createElement('style');
  tiltStyle.textContent = '.links { perspective: 1200px; }';
  document.head.appendChild(tiltStyle);

  var _rafId = null;
  document.addEventListener('mousemove', function(e) {
    if (_rafId) return;
    var mx = e.clientX, my = e.clientY;
    _rafId = requestAnimationFrame(function() {
      _rafId = null;
      var cards   = document.querySelectorAll('.link-card');
      var hovered = document.elementFromPoint(mx, my);
      var hovCard = hovered ? hovered.closest('.link-card') : null;
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var rect = card.getBoundingClientRect();
        var cx = rect.left + rect.width  / 2;
        var cy = rect.top  + rect.height / 2;
        if (card === hovCard) {
          // Tilt 3D en la card bajo el cursor
          var x = (mx - rect.left) / rect.width  - 0.5;
          var y = (my - rect.top)  / rect.height - 0.5;
          card.style.transform = 'translateY(-2px) rotateX(' + (-y * 6) + 'deg) rotateY(' + (x * 6) + 'deg)';
        } else {
          // Atracción magnética suave para cards cercanas
          var dx = mx - cx, dy = my - cy;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 140) {
            var s = (1 - dist / 140) * 0.11;
            card.style.transform = 'translate(' + (dx * s) + 'px,' + (dy * s * 0.7) + 'px)';
          } else {
            card.style.transform = '';
          }
        }
      }
    });
  });

  document.addEventListener('mouseleave', function(e) {
    var card = e.target.closest('.link-card');
    if (card) {
      var allCards = document.querySelectorAll('.link-card');
      for (var i = 0; i < allCards.length; i++) allCards[i].style.transform = '';
    }
  }, true);
}

function doAvatarCoinFlip() {
  var wrap = document.querySelector('.avatar-wrap');
  if (!wrap || _avatarFlipped) return;
  _avatarFlipped = true;
  var avatarEl = wrap.querySelector('.avatar');
  if (!avatarEl) return;

  var age = new Date().getFullYear() - 2000; // 2000 = año de nacimiento

  // Construir estructura 3D si no existe aún
  if (!wrap.querySelector('.avatar-flip-inner')) {
    var origHTML = avatarEl.innerHTML;
    avatarEl.innerHTML = '';
    var flipInner = document.createElement('div');
    flipInner.className = 'avatar-flip-inner';
    var face = document.createElement('div');
    face.className = 'avatar-face';
    face.innerHTML = origHTML;
    var back = document.createElement('div');
    back.className = 'avatar-back';
    back.innerHTML = '<div class="avatar-age">'
      + '<span class="age-emoji">🎂</span>'
      + '<span class="age-n">' + age + '</span>'
      + '<span class="age-l">años</span>'
      + '</div>';
    flipInner.appendChild(face);
    flipInner.appendChild(back);
    avatarEl.appendChild(flipInner);
  } else {
    // Actualizar edad si la estructura ya existe
    var ageEl = wrap.querySelector('.age-n');
    if (ageEl) ageEl.textContent = age;
  }

  var flipInner = wrap.querySelector('.avatar-flip-inner');
  if (!flipInner) { _avatarFlipped = false; return; }

  // Flip hacia atrás (lado con la edad)
  setTimeout(function() { flipInner.classList.add('flipped'); }, 30);

  // Volver al frente tras 2.5s
  setTimeout(function() {
    flipInner.classList.remove('flipped');
    setTimeout(function() { _avatarFlipped = false; }, 420);
  }, 2800);
}

document.addEventListener('click', function(e) {
  var wrap = e.target.closest('.avatar-wrap');
  if (!wrap) return;
  _avatarTaps++;
  if (_avatarTimer) clearTimeout(_avatarTimer);
  if (_avatarTaps >= 2) {
    _avatarTaps = 0;
    doAvatarCoinFlip();
  } else {
    _avatarTimer = setTimeout(function() {
      if (_avatarTaps === 1) openLightbox();
      _avatarTaps = 0;
    }, 280);
  }
});

// ══════════════════════════════════════════════════════
window._gyroX = 0; window._gyroY = 0;
if (typeof DeviceOrientationEvent !== 'undefined') {
  var _gyroPermission = false;
  function _initGyro() {
    window.addEventListener('deviceorientation', function(e) {
      // gamma = inclinación izquierda/derecha (-90 a 90)
      // beta  = inclinación frente/atrás (-180 a 180)
      window._gyroX = (e.gamma || 0) / 90 * 1.2;  // normalizado -1.2 a 1.2
      window._gyroY = Math.max(-1, Math.min(1, (e.beta  || 0) / 60));
    }, { passive: true });
  }
  // iOS 13+ requiere permiso explícito
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.addEventListener('touchend', function _reqGyro() {
      if (_gyroPermission) return;
      DeviceOrientationEvent.requestPermission().then(function(state) {
        if (state === 'granted') { _gyroPermission = true; _initGyro(); }
      }).catch(function() {});
      document.removeEventListener('touchend', _reqGyro);
    }, { once: true });
  } else {
    _initGyro();
  }
}

function _tPrint(html) {

function _tLine(text, cls) {
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<span' + (cls ? ' class="' + cls + '"' : '') + '>' + safe + '</span>';
}

function _execCmd(raw) {
  var cmd = raw.trim();
  // En modo Python permitir línea vacía (señal para ejecutar bloque)
  if (!cmd && !_pythonMode) return;
  if (cmd) { _termHistory.unshift(cmd); _termHistIdx = -1; }
  var promptStr = _pythonMode ? (_pyIndentDepth > 0 ? '... ' : '>>> ') : 'mario@portfolio:~$ ';
  _tPrint(_tLine(promptStr + (cmd || ''), 'tp'));
  // Actualizar el label visible del prompt
  var pEl = document.getElementById('t-prompt');
  if (pEl) pEl.textContent = promptStr;

  if (_pythonMode) {
    // Salir de Python
    if (cmd === 'exit()' || cmd === 'quit()') {
      _exitPythonMode();
      return;
    }

    // Línea vacía → si hay bloque acumulado, ejecutarlo
    if (cmd === '') {
      if (_pyIndentDepth > 0 && _pythonBuffer.trim()) {
        var block = _pythonBuffer;
        _pythonBuffer = '';
        _pyIndentDepth = 0;
        _updatePyPrompt(0);
        _runSkulpt(block);
      }
      return;
    }

    // Detectar apertura de bloque (línea termina en :)
    var stripped = cmd.replace(/#.*$/, '').trimRight();
    if (/:\s*$/.test(stripped)) {
      _pyIndentDepth++;
    }
    // Detectar cierre de bloque por des-indentación (vuelta a col 0 sin abrir nuevo bloque)
    else if (_pyIndentDepth > 0 && cmd.length > 0 && !/^\s/.test(cmd) && !/:\s*$/.test(stripped)) {
      // Línea sin indentación dentro de bloque = cierre implícito → acumular y ejecutar al blank
      // (comportamiento real de Python REPL)
    }

    _pythonBuffer += cmd + '\n';

    if (_pyIndentDepth === 0) {
      // Línea simple (sin bloque) → ejecutar de inmediato
      var code = _pythonBuffer;
      _pythonBuffer = '';
      _runSkulpt(code);
    } else {
      // Dentro de bloque → seguir acumulando, mostrar ...
      _updatePyPrompt(_pyIndentDepth);
    }
    return;
  }

  // SQL SELECT
  if (/^select\s+/i.test(cmd)) {
    var tableMatch = cmd.match(/from\s+(\w+)/i);
    if (!tableMatch) { _tPrint(_tLine('ERROR: sintaxis: SELECT * FROM <tabla>', 'te')); return; }
    var tbl = tableMatch[1].toLowerCase();
    if (_sqlTables[tbl]) {
      _tPrint(_tLine(_sqlTables[tbl](), 'th'));
    } else {
      _tPrint(_tLine('ERROR: tabla "' + tbl + '" no existe.', 'te'));
      _tPrint(_tLine('Tablas: skills, redes, perfil, experiencia, habilidades, proyectos', 'tc'));
    }
    return;
  }

  switch(cmd.toLowerCase().split(' ')[0]) {
    case 'help':
      _tPrint(_tLine('Comandos disponibles:', 'th'));
      _tPrint(_tLine('  help                       → esta ayuda', 'tc'));

      _tPrint(_tLine('  git checkout <modo>        → cambiar a pro/casual', 'tc'));
      _tPrint(_tLine('  SELECT * FROM <tabla>      → SQL (skills/redes/perfil/…)', 'tc'));
      _tPrint(_tLine('  python                     → REPL Python real (Skulpt)', 'tc'));
      _tPrint(_tLine('  nano [archivo.py]          → editor de código con output panel', 'tc'));

      _tPrint(_tLine('  reset                      → limpiar pantalla + sesión Python', 'tc'));

      var sub = cmd.split(/\s+/)[1] || '';
      if (sub === 'log') {
        _tPrint(_tLine('commit history — mario/vida.git', 'ts'));
        _gitLog.forEach(function(c) {
          _tPrint(_tLine('commit ' + c.hash, 'th') + ' ' + _tLine(c.msg, ''));
        });
      } else if (sub === 'status') {
        _tPrint(_tLine('On branch ' + currentMode, 'th'));
        _tPrint(_tLine('nothing to commit, working tree clean ✓', 'tc'));
        _tPrint(_tLine('(proyecto de grado: 1 archivo sin push)', 'ts'));
      } else if (sub === 'branch') {
        _tPrint(_tLine('* ' + currentMode, 'th'));
        _tPrint(_tLine('  ' + (currentMode === 'pro' ? 'casual' : 'pro'), ''));
      } else if (sub === 'checkout') {
        var target = cmd.split(/\s+/)[2] || '';
        if (target === 'pro' || target === 'casual') {
          _tPrint(_tLine("Switched to branch '" + target + "'", 'th'));
          setTimeout(function() { closeTerminal(); switchMode(target); }, 600);
        } else {
          _tPrint(_tLine("error: pathspec '" + target + "' no coincide con ninguna rama conocida", 'te'));
          _tPrint(_tLine('Ramas válidas: pro, casual', 'tc'));
        }
      } else {
        _tPrint(_tLine("git: '" + sub + "' no es un comando git conocido aquí", 'te'));
      }
      break;
    case 'nano':
    case 'edit':
    case 'vim':
    case 'vi': {
      var edFile = cmd.split(/\s+/).slice(1).join(' ').trim() || 'script.py';
      if (!/\.py$/.test(edFile)) edFile += '.py';
      if (!_skulptLoaded) {
        _loadSkulpt(function() {});  // pre-cargar Skulpt en background
      }
      _openEditor(edFile);
      _tPrint(_tLine('Abriendo editor: ' + edFile + ' (Ctrl+Enter: Run · Ctrl+S: Save · Ctrl+W: Close)', 'ts'));
      break;
    }
    case 'run': {
      var runFile = cmd.split(/\s+/).slice(1).join(' ').trim();
      if (!runFile) { _tPrint(_tLine('uso: run <archivo.py>', 'te')); break; }
      if (!/\.py$/.test(runFile)) runFile += '.py';
      var src = _termFS[runFile];
      if (!src) { _tPrint(_tLine('Error: archivo "' + runFile + '" no encontrado. Usa "ls" para ver archivos.', 'te')); break; }
      var code = typeof src === 'function' ? src() : src;
      _tPrint(_tLine('─── python ' + runFile + ' ───', 'ts'));
      if (!_skulptLoaded) {
        _loadSkulpt(function() { _runSkulpt(code); });
        _tPrint(_tLine('Cargando Python...', 'ts'));
      } else {
        _runSkulpt(code);
      }
      break;
    }
    case 'reset':
      document.getElementById('t-out').innerHTML = '';
      _pythonBuffer  = '';
      _pyIndentDepth = 0;
      _pySessionCode = '';
      _pythonMode    = false;
      var pReset = document.getElementById('t-prompt');
      if (pReset) pReset.textContent = 'mario@portfolio:~$ ';
      _tPrint(_tLine('Terminal y sesión Python reiniciadas.', 'ts'));
      break;
    case 'matrix':
      _runMatrix();
      break;
    case 'theme':
      var themeArg = cmd.split(/\s+/)[1] || '';
      _applyTermTheme(themeArg);
      break;
    case 'python':
    case 'python3':
      _tPrint(_tLine('Cargando Python (Skulpt)...', 'ts'));
      _loadSkulpt(function() {
        _pythonMode    = true;
        _pythonBuffer  = '';
        _pyIndentDepth = 0;
        _pySessionCode = '';
        var pEl4 = document.getElementById('t-prompt');
        if (pEl4) pEl4.textContent = '>>> ';
        _tPrint(_tLine('Python 3.11 (Skulpt) — mario@portfolio', 'ts'));
        _tPrint(_tLine('for/while/if/def/class/listas — estado persiste en la sesión', 'tc'));
        _tPrint(_tLine('Bloques: terminar con línea vacía · nano script.py = editor completo', 'tc'));
        _tPrint(_tLine('exit() para salir · reset para limpiar sesión', 'tc'));
      });
      break;
    case 'clear':
      document.getElementById('t-out').innerHTML = '';
      break;
    case 'exit':
    case 'quit':
      closeTerminal();
      break;
    case 'sudo':
      _tPrint(_tLine('[sudo] password for mario: ', 'tp'));
      setTimeout(function() {
        _tPrint(_tLine('mario is not in the sudoers file. This incident will be reported.', 'te'));
        _tPrint(_tLine('(mentira, no hay sudoers aquí 😄)', 'ts'));
      }, 800);
      break;
    default:
      if (cmd) _tPrint(_tLine('bash: ' + cmd.split(' ')[0] + ': command not found — escribe "help"', 'te'));
  }
}

// ── MATRIX RAIN ───────────────────────────────────────────────────────
var _matrixRunning = false;
function _runMatrix() {
  if (_matrixRunning) { _tPrint(_tLine('[matrix ya está corriendo]', 'ts')); return; }
  _matrixRunning = true;
  var COLS = 42, ROWS = 14;
  var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789MARIO'.split('');
  var grid = [];
  var drops = [];
  for (var ci = 0; ci < COLS; ci++) {
    drops[ci] = Math.floor(Math.random() * ROWS);
    grid.push(new Array(ROWS).fill(' '));
  }
  var out = document.getElementById('t-out');
  var placeholder = document.createElement('pre');
  placeholder.className = 'matrix-block';
  placeholder.style.cssText = 'margin:4px 0;font-size:0.7em;line-height:1.2;color:#0f0;';
  if (out) out.appendChild(placeholder);
  var frames = 0, maxFrames = 48;
  var iv = setInterval(function() {
    for (var c = 0; c < COLS; c++) {
      for (var r = ROWS - 1; r > 0; r--) grid[c][r] = grid[c][r-1];
      grid[c][0] = Math.random() > 0.5 ? chars[Math.floor(Math.random()*chars.length)] : ' ';
    }
    var lines = [];
    for (var r = 0; r < ROWS; r++) {
      lines.push(grid.map(function(col) { return col[r]; }).join(''));
    }
    placeholder.textContent = lines.join('\n');
    if (out) out.scrollTop = out.scrollHeight;
    frames++;
    if (frames >= maxFrames) {
      clearInterval(iv);
      _matrixRunning = false;
      placeholder.style.color = '#0f06';
      setTimeout(function() {
        if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
        _tPrint(_tLine('[wake up, mario...]', 'ts'));
      }, 600);
    }
  }, 80);
}

// ── Carga lazy de Skulpt desde CDN ────────────────────────────────
function _loadSkulpt(cb) {
  if (_skulptLoaded) { if(cb) cb(); return; }
  if (_skulptLoading) { _skulptQueue.push(cb); return; }
  _skulptLoading = true;
  var s1 = document.createElement('script');
  s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt.min.js';
  s1.onload = function() {
    var s2 = document.createElement('script');
    s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/skulpt/1.2.0/skulpt-stdlib.js';
    s2.onload = function() {
      _skulptLoaded = true;
      _skulptLoading = false;
      if (cb) cb();
      _skulptQueue.forEach(function(fn) { if(fn) fn(); });
      _skulptQueue = [];
    };
    s2.onerror = function() {
      _tPrint(_tLine('Error cargando Skulpt stdlib', 'te'));
      _skulptLoading = false;
    };
    document.head.appendChild(s2);
  };
  s1.onerror = function() {
    _skulptLoading = false;
    _tPrint(_tLine('Error cargando Skulpt. ¿Hay conexión a internet?', 'te'));
  };
  document.head.appendChild(s1);
}

// ── Ejecutar Python (REPL o editor) ───────────────────────────────
// opts.editor = true  → output al panel del editor, no al terminal
// opts.silent = true  → sin output (para re-ejecutar código de sesión)
function _runSkulpt(code, opts) {
  opts = opts || {};
  if (!_skulptLoaded) { _tPrint(_tLine('Python no está listo aún...', 'ts')); return; }

  function builtinRead(x) {
    if (typeof Sk !== 'undefined' && Sk.builtinFiles && Sk.builtinFiles['files'][x])
      return Sk.builtinFiles['files'][x];
    throw "File not found: '" + x + "'";
  }

  // Para el REPL: ejecutar sesión previa sin output, luego el nuevo código con output
  var fullCode = opts.editor ? code : (_pySessionCode + code);
  var _outputActive = !opts.editor && !opts.silent ? false : true;
  // (el output se activa después de que pasa el código viejo)
  var _sessionLines = _pySessionCode.split('\n').length;
  var _lineCounter = 0;

  function _emitLine(text, isError) {
    if (opts.editor) {
      // Output al panel del editor
      var outEl = document.getElementById('py-editor-out');
      if (!outEl) return;
      var span = document.createElement('span');
      if (isError) span.className = 'te';
      var lines = text.split('\n');
      lines.forEach(function(ln, i) {
        if (i === lines.length - 1 && ln === '') return;
        var row = document.createElement('span');
        if (isError) row.className = 'te';
        row.textContent = ln;
        outEl.appendChild(row);
        outEl.appendChild(document.createTextNode('\n'));
      });
      outEl.scrollTop = outEl.scrollHeight;
    } else {
      // Output al terminal
      var lines = text.split('\n');
      lines.forEach(function(ln, idx) {
        if (idx === lines.length - 1 && ln === '') return;
        var safe = ln.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        _tPrint('<span' + (isError ? ' class="te"' : '') + '>' + safe + '</span>');
      });
    }
  }

  Sk.configure({
    output: function(text) {
      if (opts.silent) return;
      if (!opts.editor && _pySessionCode) {
        // Contar líneas para saber cuándo termina el código viejo
        _lineCounter++;
        if (!_outputActive && _lineCounter > _sessionLines) _outputActive = true;
        if (!_outputActive) return;
      }
      _emitLine(text, false);
    },
    read: builtinRead,
    execLimit: 60000,
  });

  var promise = Sk.misceval.asyncToPromise(function() {
    return Sk.importMainWithBody('<stdin>', false, fullCode, true);
  });

  promise.then(function() {
    if (!opts.editor && !opts.silent) {
      _pySessionCode += code; // añadir a sesión exitosa
    }
    if (opts.editor) {
      var statusEl = document.getElementById('py-editor-status');
      if (statusEl) statusEl.textContent = '✓ Ejecutado · Ctrl+Enter: Run · Ctrl+S: Guardar · Ctrl+W: Cerrar';
    }
  }).catch(function(err) {
    var msg = (err && err.toString) ? err.toString() : String(err);
    _emitLine(msg, true);
    if (opts.editor) {
      var statusEl = document.getElementById('py-editor-status');
      if (statusEl) statusEl.textContent = '✗ Error — ' + msg.split('\n')[0];
    }
  });
}

var _editorFile = 'script.py';

function _createEditorDOM() {
  if (document.getElementById('py-editor')) return;
  var el = document.createElement('div');
  el.id = 'py-editor';
  el.innerHTML =
    '<div id="py-editor-bar">' +
      '<span id="py-editor-title">📄 script.py</span>' +
      '<button class="py-ed-btn py-ed-run"   onclick="_runEditorCode()">▶ Run</button>' +
      '<button class="py-ed-btn py-ed-save"  onclick="_saveEditorFile()">💾 Save</button>' +
      '<button class="py-ed-btn py-ed-dl"    onclick="_downloadEditorFile()">⬇ Download</button>' +
      '<button class="py-ed-btn py-ed-close" onclick="_closeEditor()">✕ Close</button>' +
    '</div>' +
    '<textarea id="py-editor-code" spellcheck="false" autocorrect="off" autocapitalize="off"' +
      ' placeholder="# Escribe Python aquí..."></textarea>' +
    '<div id="py-editor-divider"></div>' +
    '<div id="py-editor-out-label">▸ Output</div>' +
    '<div id="py-editor-out"></div>' +
    '<div id="py-editor-status">Ctrl+Enter: Ejecutar &nbsp;·&nbsp; Ctrl+S: Guardar &nbsp;·&nbsp; Ctrl+W: Cerrar</div>';
  document.body.appendChild(el);

  var area = el.querySelector('#py-editor-code');
  area.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); _runEditorCode(); }
    else if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); _saveEditorFile(); }
    else if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); _closeEditor(); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      var s = this.selectionStart, en = this.selectionEnd;
      this.value = this.value.substring(0, s) + '    ' + this.value.substring(en);
      this.selectionStart = this.selectionEnd = s + 4;
    }
  });
}

function _openEditor(filename) {
  _editorFile = filename || 'script.py';
  _createEditorDOM();
  var titleEl = document.getElementById('py-editor-title');
  if (titleEl) titleEl.textContent = '📄 ' + _editorFile;
  var area = document.getElementById('py-editor-code');
  if (area) {
    if (_termFS[_editorFile] && typeof _termFS[_editorFile] !== 'function') {
      area.value = _termFS[_editorFile];
    } else if (!area.value || area.value.trim() === '') {
      area.value = '# mario@portfolio — Python Editor\n# Ctrl+Enter: Run  |  Ctrl+S: Guardar  |  Tab: Indentar\n\n';
    }
    setTimeout(function() {
      area.focus();
      area.setSelectionRange(area.value.length, area.value.length);
    }, 80);
  }
  var outEl = document.getElementById('py-editor-out');
  if (outEl) outEl.innerHTML = '';
  var statusEl = document.getElementById('py-editor-status');
  if (statusEl) statusEl.textContent = 'Ctrl+Enter: Ejecutar \u00b7 Ctrl+S: Guardar \u00b7 Ctrl+W: Cerrar';
  document.getElementById('py-editor').classList.add('open');
}

function _closeEditor() {
  var el = document.getElementById('py-editor');
  if (el) el.classList.remove('open');
  var inp = document.getElementById('t-input');
  if (inp) setTimeout(function() { inp.focus(); }, 80);
}

function _saveEditorFile() {
  var area = document.getElementById('py-editor-code');
  if (!area) return;
  _termFS[_editorFile] = area.value;
  _editorStatus('✓ Guardado: ' + _editorFile);
}

function _downloadEditorFile() {
  var area = document.getElementById('py-editor-code');
  if (!area) return;
  var blob = new Blob([area.value], { type: 'text/plain' });
  var url  = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = _editorFile; a.click();
  URL.revokeObjectURL(url);
  _editorStatus('⬇ Descargado: ' + _editorFile);
}

function _runEditorCode() {
  var area = document.getElementById('py-editor-code');
  if (!area || !area.value.trim()) return;
  var outEl = document.getElementById('py-editor-out');
  if (outEl) outEl.innerHTML = '';
  _editorStatus('⏳ Ejecutando...');

  if (!_skulptLoaded) {
    _loadSkulpt(function() { _runEditorCode(); });
    _editorStatus('Cargando Python (~1.8 MB)...');
    return;
  }
  _runSkulpt(area.value, { editor: true });
}

function _editorStatus(msg) {
  var el = document.getElementById('py-editor-status');

  el.textContent = msg;
  setTimeout(function() {

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    // Primero cerrar editor si está abierto, luego la terminal
    var edEl = document.getElementById('py-editor');
    if (edEl && edEl.classList.contains('open')) { e.preventDefault(); _closeEditor(); return; }
    if (_termOpen) { e.preventDefault(); closeTerminal(); return; }
  }
  if (!_termOpen) return;
  var inp = document.getElementById('t-input');
  if (!inp) return;
  if (e.key === 'Enter') {
    _execCmd(inp.value);
    inp.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _termHistIdx = Math.min(_termHistIdx + 1, _termHistory.length - 1);
    if (_termHistory[_termHistIdx]) inp.value = _termHistory[_termHistIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    _termHistIdx = Math.max(_termHistIdx - 1, -1);
    inp.value = _termHistIdx >= 0 ? _termHistory[_termHistIdx] : '';
  }
});

function triggerGlitch(callback) {
  document.body.classList.add('glitch-fx');
  setTimeout(function() {
    document.body.classList.remove('glitch-fx');
    if (callback) callback();
  }, 420);

// ── TRIPLE-CLIC en chip Python → glitch × 3 → terminal ──
var _chipClicks = 0, _chipTimer = null;
document.addEventListener('click', function(e) {
  // Buscar chips por texto "Python"
  var chip = e.target.closest('.skill-chip');
  if (!chip) return;
  if (chip.textContent.indexOf('Python') === -1) return;

  _chipClicks++;
  if (_chipTimer) clearTimeout(_chipTimer);

  if (_chipClicks >= 3) {
    _chipClicks = 0;
    // 3 glitches → terminal
    triggerGlitch(function() {
      setTimeout(function() {
        triggerGlitch(function() {
          setTimeout(function() {
            triggerGlitch(openTerminal);
          }, 180);
        });
      }, 180);
    });
  } else {
    // Glitch parcial por cada clic
    triggerGlitch(null);
    _chipTimer = setTimeout(function() { _chipClicks = 0; }, 1200);
  }
});

var _magicWords = ['CMD', 'sudo', 'matrix'];

  _kwBuffer += e.key;
  if (_kwTimer) clearTimeout(_kwTimer);

    if (_kwBuffer.toLowerCase().endsWith(_magicWords[i].toLowerCase())) {
      _kwBuffer = '';
      triggerGlitch(openTerminal);
      break;

});

// ── MOBILE SCROLL HERO ──
// Sólo en modo casual + pantalla pequeña.
// Transforma el layout: foto grande centrada primero,
// luego links peeking desde abajo, y al scroll la foto se encoge.
// ══════════════════════════════════════════════════════
var _mheroActive = false;
var _mheroScrollFn = null;

function initMobileScrollHero() {
  // Limpiar listener previo si existía
  if (_mheroScrollFn) {
    window.removeEventListener('scroll', _mheroScrollFn, { passive: true });
    _mheroScrollFn = null;
  }
  _mheroActive = false;

  // Solo móvil (ambos modos)
  if (window.innerWidth >= 768) return;

  var app = document.getElementById('app');
  if (!app) return;

  // La foto grande solo aplica si el usuario está cerca del tope
  if (window.pageYOffset > 40) return;

  // ── Marcar la sección de perfil como hero ──────────────
  var profileEl = app.querySelector('.profile');
  if (!profileEl) return;

  // Crear wrapper hero que envuelve profile + actualmente
  var heroWrap = document.createElement('div');
  heroWrap.className = 'mob-hero';
  heroWrap.id = 'mob-hero-wrap';
  profileEl.parentNode.insertBefore(heroWrap, profileEl);
  heroWrap.appendChild(profileEl);
  var actEl = app.querySelector('#actualmente-el');
  if (actEl) heroWrap.appendChild(actEl);

  // Mover stats y share button al inicio de los links (fuera del hero)
  // ya que en móvil sin split, stats están dentro del .profile
  // → dejarlos donde están en la jerarquía del DOM

  // ── Blur en la 2ª tarjeta ──────────────────────────────
  var allCards = app.querySelectorAll('.link-card');
  var peekBlurCard = allCards[1] || null; // 2ª card = peeking blurred
  if (peekBlurCard) peekBlurCard.classList.add('mob-peek-blur');

  _mheroActive = true;
  var peekUnblurred = false;

  // ── Listener de scroll ─────────────────────────────────
  var _raf = false;
  _mheroScrollFn = function() {
    if (_raf) return;
    _raf = true;
    requestAnimationFrame(function() {
      _raf = false;
      var sy = window.pageYOffset || 0;
      var maxShrink = 140; // px de scroll hasta tamaño mínimo
      var ratio = Math.min(sy / maxShrink, 1);
      var extra = Math.round((1 - ratio) * 34); // 34px → 0px extra
      document.documentElement.style.setProperty('--mhero-extra', extra + 'px');

      // Revelar la 2ª tarjeta borrosa cuando empieza el scroll
      if (!peekUnblurred && sy > 12) {
        peekUnblurred = true;
        if (peekBlurCard) peekBlurCard.classList.remove('mob-peek-blur');
      }
    });
  };
  window.addEventListener('scroll', _mheroScrollFn, { passive: true });

  // Disparar una vez para estado inicial correcto
  _mheroScrollFn();
}

// Arrancar hero en carga inicial
setTimeout(initMobileScrollHero, 120);

// ══════════════════════════════════════════════════════
// ── SCROLL REVEAL ──
var revealObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });

function initReveal() {
  var els = document.querySelectorAll('.link-card, .actualmente');
  for (var i = 0; i < els.length; i++) {
    if (!els[i].classList.contains('fade-up') && !els[i].classList.contains('fade-up-card')) {
      els[i].classList.add('reveal');
      els[i].style.transitionDelay = (i * 0.05) + 's';
      revealObserver.observe(els[i]);
    }
  }
}
setTimeout(initReveal, 100);

// ── BOTÓN COMPARTIR (delegado) ──
document.addEventListener('click', function(e) {
  var shareBtn = e.target.closest('#share-btn');
  if (!shareBtn) return;
  var shareLabel = shareBtn.querySelector('#share-label');
  var base = CONFIG.siteUrl || window.location.origin;
  var url  = currentMode === 'pro' ? base + '#pro' : base;
  if (navigator.share) {
    navigator.share({ title: CONFIG.nombre, url: url });
  } else {
    navigator.clipboard.writeText(url).then(function() {
      shareBtn.classList.add('copied');
      shareLabel.textContent = '\u2713 Link copiado';
      setTimeout(function() {
        shareBtn.classList.remove('copied');
        shareLabel.textContent = 'Compartir p\u00e1gina';
      }, 2000);
    });
  }
});
</script>
